http:
  routers:
    hermes-webhook:
      rule: "Host(`hermes-webui-wvwd.srv1699470.hstgr.cloud`) && PathPrefix(`/webhooks`)"
      entryPoints: ["websecure"]
      tls:
        certResolver: letsencrypt
      service: hermes-webhook-svc
    cookie-sync:
      rule: "Host(`hermes-webui-wvwd.srv1699470.hstgr.cloud`) && PathPrefix(`/api/browser-sync`)"
      entryPoints: ["websecure"]
      tls:
        certResolver: letsencrypt
      service: cookie-sync-svc
  services:
    hermes-webhook-svc:
      loadBalancer:
        servers:
          - url: "http://127.0.0.1:8644"
    cookie-sync-svc:
      loadBalancer:
        servers:
          - url: "http://127.0.0.1:9999"
