# ============================================================
# Comprehensive Intake YAML Template
# ============================================================
# این تمپلیت کامل‌تر از نمونه‌ای هست که توی Phase D SKILL.md هست.
# بعد از تأیید کاربر، intake.yaml رو بر اساس این تمپلیت و نیازهای خاص
# پروژه بنویس و توی /workspace/n8n-wfb/<slug>/ ذخیره کن.
# ============================================================

intake:
  title: "Project Name — توضیح کوتاه"
  slug: "project-slug"
  description: |-
    توضیح کامل پروژه در ۲-۳ خط

  primary_pattern: "chatbot"         # الگوی اصلی از patterns/
  secondary_patterns:
    - "data_persistence"             # الگوهای فرعی
    - "triage"
  future_patterns:
    - "RAG (PGVector)"               # کاربر بعداً اضافه می‌کنه

  # ============================================================
  # تریگرها
  # ============================================================
  trigger:
    type: "telegram"                 # یا webhook, schedule, ...
    details:
      - "message"
      - "callback_query"
      - "command"
    bot_commands:
      - command: "/start"
        description: "شروع و خوش‌آمدگویی"
      - command: "/menu"
        description: "نمایش منو"

  # ============================================================
  # Credentialها
  # ============================================================
  services:
    - name: "Telegram Bot"
      credential_name: "credential_name"
      credential_type: "telegramApi"
      credential_id: "id_from_list_credentials"
      purpose: "توضیح"

    - name: "AI Provider"
      credential_name: "credential_name"
      credential_type: "openRouterApi"  # یا openAiApi, groqApi, ...
      credential_id: "id"
      purpose: "AI Agent برای پشتیبانی"
      model_preference: "مدل دلخواه"

    - name: "PostgreSQL"
      credential_name: "credential_name"
      credential_type: "postgres"
      credential_id: "id"
      purpose: "ذخیره دائمی اطلاعات"
      tables_needed:
        - "users"
        - "products"
        - "orders"

    - name: "Data Table (n8n Cache)"
      purpose: "کش موقت session کاربران"
      type: "n8n_data_table"

  # ============================================================
  # ذخیره‌سازی
  # ============================================================
  storage:
    permanent:
      engine: "PostgreSQL"
      credential: "name"
      tables:
        users:
          schema:
            - name: "id"
            - name: "telegram_id"
            - name: "first_name"
            - name: "created_at"
        products:
          schema: []
        orders:
          schema: []
    cache:
      engine: "Data Table"
      purpose: "Session management"

  # ============================================================
  # هوش مصنوعی
  # ============================================================
  ai:
    llm:
      provider: "OpenRouter"
      credential: "name"
      model: "model-name"
    memory:
      type: "Postgres Chat Memory"
      session_key: "telegram_chat_id"
      context_window: 20
    rag:
      enabled: false
      planned_engine: "PGVector"
      notes: "کاربر بعداً داکیومنت‌ها رو اضافه می‌کنه"

  # ============================================================
  # ورک‌فلوهای مشابه (از search result)
  # ============================================================
  similar_workflows_found:
    - id: "uuid-from-search"
      title: "نام ورک‌فلو"
      goal: "هدف اصلی"
      flowLogic: "خلاصه جریان"
      nodeCount: 110
      relevance: "HIGH / MEDIUM / LOW"
      adaptation_needed:
        - "Google Sheets → PostgreSQL"
        - "Paystack → درگاه بعدی"
        - "اضافه کردن AI Agent"

  # ============================================================
  # ورک‌فلوهای پیشنهادی
  # ============================================================
  proposed_workflows:
    WF01:
      name: "WF01 — Core Feature"
      description: "توضیح"
      priority: 1
      based_on: "uuid"
      estimated_nodes: 40-60
      features:
        - "feature 1"
        - "feature 2"

  # ============================================================
  # پنل ادمین
  # ============================================================
  admin_panel:
    access: "محدود به Telegram Admin ID"
    authentication: "بررسی telegram_id با لیست ادمین‌ها"
    entry_point: "/admin"
    sections:
      dashboard:
        title: "داشبورد"
        features: []
      products:
        title: "مدیریت محصولات"
        features: []
      orders:
        title: "مدیریت سفارشات"
        features: []
      customers:
        title: "مدیریت مشتریان"
        features: []
      broadcast:
        title: "ارسال پیام جمعی"
        features: []
      reports:
        title: "گزارش و آمار"
        features: []

  # ============================================================
  # جریان کاربر
  # ============================================================
  user_flow:
    - مرحله: "شروع"
      description: "کاربر /start می‌زند"
      actions: []

  # ============================================================
  # تنظیمات
  # ============================================================
  settings:
    language: "persian"
    admin_telegram_id: "PLACEHOLDER"
    channel_id: "PLACEHOLDER"
    currency: "تومان ایران"
    payment_gateway: "TBD"

  constraints:
    - "درگاه پرداخت فعلاً وجود ندارد"
    - "Admin ID placeholder است"

  unused_credentials:
    - "cred1  # استفاده نشد"
    - "cred2  # استفاده نشد"

  search_history:
    - query: "search query"
      category: "Category"
      results_found: 3

  metadata:
    intake_date: "تاریخ"
    intake_phase: "1-complete"
    next_phase: "planner"
    intake_by: "Hermes Agent — n8n-intake skill v4.3.0"
    user_confirmed: true
